<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💍 ريتاج...</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Tajawal', sans-serif;
    overflow: hidden;
    transition: background 1.2s ease;
  }

  /* ─── PROPOSAL SCREEN ─── */
  #proposal {
    text-align: center;
    padding: 2rem;
    position: relative;
    z-index: 10;
  }
  .ring-icon {
    font-size: 4rem;
    animation: pulse-ring 2s ease-in-out infinite;
    display: block;
    margin-bottom: 1.2rem;
  }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1) rotate(-8deg); }
    50%       { transform: scale(1.15) rotate(8deg); }
  }
  .question {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4.2rem);
    color: #2d2d2d;
    line-height: 1.3;
    margin-bottom: 2rem;
  }
  .buttons {
    display: flex;
    gap: 1.4rem;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn-yes {
    padding: 0.85rem 2.6rem;
    font-size: 1.25rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(255,117,140,.45);
    transition: transform .18s, box-shadow .18s;
  }
  .btn-yes:hover { transform: scale(1.07); box-shadow: 0 12px 36px rgba(255,117,140,.6); }
  .btn-yes:active { transform: scale(.97); }

  #btn-no {
    padding: 0.85rem 2.6rem;
    font-size: 1.25rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    position: fixed;
    box-shadow: 0 8px 28px rgba(255,117,140,.45);
    z-index: 100;
  }

  /* ─── ANGRY CAT OVERLAY ─── */
  #cat-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }
  #cat-overlay.show { display: flex; }
  #cat-img {
    width: min(55vw, 380px);
    border-radius: 24px;
    animation: cat-bounce .4s ease-out;
  }
  @keyframes cat-bounce {
    0%  { transform: scale(.3) rotate(-10deg); opacity: 0; }
    70% { transform: scale(1.08) rotate(3deg); opacity: 1; }
    100%{ transform: scale(1) rotate(0deg);    opacity: 1; }
  }
  #cat-text {
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(1.8rem, 6vw, 3.5rem);
    color: #fff;
    font-weight: 700;
    text-shadow: 0 2px 18px rgba(0,0,0,.6);
    animation: cat-bounce .4s ease-out .1s both;
  }

  /* ══════════════════════════════════
     STAGES
  ══════════════════════════════════ */
  .stage {
    display: none;
    position: fixed;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 2rem;
    z-index: 50;
  }
  .stage.show { display: flex; }

  .s-emoji { font-size: 5rem; animation: pop-in .5s cubic-bezier(.17,.67,.35,1.4) both; }

  .s-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 6vw, 4rem);
    color: #c0375a;
    margin: .5rem 0 .4rem;
    animation: pop-in .5s .15s cubic-bezier(.17,.67,.35,1.4) both;
  }
  .s-sub {
    font-size: 1.2rem;
    color: #d96080;
    font-weight: 300;
    margin-bottom: 1.8rem;
    animation: pop-in .5s .3s cubic-bezier(.17,.67,.35,1.4) both;
  }

  .next-btn {
    padding: .75rem 2.2rem;
    font-size: 1.1rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,117,140,.4);
    animation: pop-in .5s .5s cubic-bezier(.17,.67,.35,1.4) both;
    transition: transform .15s;
  }
  .next-btn:hover { transform: scale(1.06); }

  /* stage 2 wedding image */
  .wedding-img {
    width: min(70vw, 400px);
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,.18);
    animation: pop-in .6s cubic-bezier(.17,.67,.35,1.4) both;
    margin-bottom: 1.2rem;
  }

  /* stage 3 kittens */
  .kittens-row {
    display: flex;
    gap: 1.6rem;
    justify-content: center;
    flex-wrap: wrap;
    animation: pop-in .6s .3s cubic-bezier(.17,.67,.35,1.4) both;
    margin-bottom: 1.8rem;
  }
  .kitten-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .6rem;
  }
  .kitten-card img {
    width: clamp(110px, 20vw, 190px);
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #ff9eb5;
    box-shadow: 0 6px 22px rgba(255,117,140,.35);
  }
  .kitten-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: #c0375a;
    font-weight: 700;
  }

  @keyframes pop-in {
    from { opacity: 0; transform: scale(.5); }
    to   { opacity: 1; transform: scale(1);  }
  }

  /* ── floating effects ── */
  .love-msg {
    position: fixed;
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    color: #c0375a;
    pointer-events: none;
    animation: float-msg 4s ease-in-out forwards;
    white-space: nowrap;
    z-index: 40;
  }
  @keyframes float-msg {
    0%   { opacity: 0; transform: translateY(40px) scale(.8); }
    20%  { opacity: 1; transform: translateY(0) scale(1); }
    80%  { opacity: 1; transform: translateY(-20px) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(.9); }
  }
  .heart {
    position: fixed;
    bottom: -60px;
    pointer-events: none;
    animation: rise-heart linear forwards;
    opacity: .85;
    z-index: 40;
  }
  @keyframes rise-heart {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: .85; }
    100% { transform: translateY(-110vh) rotate(25deg) scale(1.3); opacity: 0; }
  }
  .confetti-piece {
    position: fixed;
    top: -20px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 40;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg) scaleX(1); }
    50%  { transform: translateY(50vh) rotate(180deg) scaleX(-1); }
    100% { transform: translateY(110vh) rotate(360deg) scaleX(1); opacity:0; }
  }
</style>
</head>
<body>

<!-- ════════ PROPOSAL SCREEN ════════ -->
<div id="proposal">
  <span class="ring-icon">💍</span>
  <h1 class="question">تتزوجيني يا ريتاج؟</h1>
  <div class="buttons">
    <button class="btn-yes" onclick="goStage1()">Yes 💕</button>
    <button id="btn-no" onmouseenter="runAway()" onclick="runAway()">No 🙅</button>
  </div>
</div>

<!-- ════════ ANGRY CAT ════════ -->
<div id="cat-overlay">
  <img id="cat-img" src="angry-cat.gif" alt="Angry Cat">
  <div id="cat-text">بجد والله🤨</div>
</div>

<!-- ════════ STAGE 1 — YES! ════════ -->
<div id="stage-1" class="stage">
  <div class="s-emoji">🥳</div>
  <h2 class="s-title">الله اكبررر! 💍</h2>
  <p class="s-sub"></p>
  <button class="next-btn" onclick="goStage2()">الخطوة الجاية  الزفاف 💒</button>
</div>

<!-- ════════ STAGE 2 — WEDDING ════════ -->
<div id="stage-2" class="stage">
  <img class="wedding-img" src="wedding-cats.jpg" alt="Wedding Cats">
  <h2 class="s-title">🎊 عقد القران اتم! 🎊</h2>
  <p class="s-sub">بالرفاه والبنين   ! 💏</p>
  <button class="next-btn" onclick="goStage3()">وبعدين... جه الإنجاب! 🍼</button>
</div>

<!-- ════════ STAGE 3 — KITTENS ════════ -->
<div id="stage-3" class="stage">
  <h2 class="s-title">🐱 أهلاً بالعيلة الصغيرة! 🐱</h2>
  <p class="s-sub">ربنا رزقنا بثلاث قطط حلوين زي أمهم! 🌸</p>
  <div class="kittens-row">
    <div class="kitten-card">
      <img src="cat1.jpg" alt="روزالين">
      <span class="kitten-name">روزالين 🌹</span>
    </div>
    <div class="kitten-card">
      <img src="cat2.jpg" alt="ريان">
      <span class="kitten-name">ريان ⭐</span>
    </div>
    <div class="kitten-card">
      <img src="cat3.jpg" alt="بوشنكه">
      <span class="kitten-name">بوشنكه 🐾</span>
    </div>
  </div>
  <p class="s-sub" style="animation-delay:.6s"> </p>
</div>

<script>
/* ══ NO button ══ */
let noAttempts = 0;
const btnNo = document.getElementById('btn-no');
let catTimeout = null;
let hasEscaped = false;

function positionNoInitial() {
  if (hasEscaped) return;
  const btnYes = document.querySelector('.btn-yes');
  const rect = btnYes.getBoundingClientRect();
  btnNo.style.left = (rect.left - btnNo.offsetWidth - 22) + 'px';
  btnNo.style.top  = rect.top + 'px';
}
window.addEventListener('load', positionNoInitial);
window.addEventListener('resize', positionNoInitial);
setTimeout(positionNoInitial, 100);

function runAway() {
  hasEscaped = true;
  noAttempts++;
  const margin = 80;
  const vw = window.innerWidth  - btnNo.offsetWidth  - margin;
  const vh = window.innerHeight - btnNo.offsetHeight - margin;
  btnNo.style.left = (Math.random() * (vw - margin) + margin) + 'px';
  btnNo.style.top  = (Math.random() * (vh - margin) + margin) + 'px';
  if (noAttempts % 7 === 0) showAngyCat();
}

function showAngyCat() {
  const overlay = document.getElementById('cat-overlay');
  overlay.classList.add('show');
  clearTimeout(catTimeout);
  catTimeout = setTimeout(() => overlay.classList.remove('show'), 2200);
}

/* ══ STAGES ══ */
const confettiColors = ['#ff6b8a','#ff9eb5','#ffccd5','#ffd700','#b5ead7','#c7ceea','#f9ca24','#ff6b81'];
const heartEmojis    = ['❤️','💕','💖','💗','💝','🌸','✨','💓'];
const loveMessages   = [
  '💖 ',
  '🌸 ',
  '💌    ',
  '🌹   ',
  '🥰   ',
  '🎊 ',
  '💍  ',
  '🌙     '
];

let heartInterval, msgInterval, confettiStarted = false;
let msgIdx = 0;

function startEffects() {
  if (!confettiStarted) { spawnConfetti(); confettiStarted = true; }
  if (!heartInterval) heartInterval = setInterval(addHeart, 500);
  if (!msgInterval)   msgInterval   = setInterval(addMsg, 1100);
  for (let i = 0; i < 15; i++) setTimeout(addHeart, i * 200);
  for (let i = 0; i < 4;  i++) setTimeout(addMsg, i * 700);
}

function hideAll() {
  document.getElementById('proposal').style.display = 'none';
  document.getElementById('btn-no').style.display   = 'none';
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('show'));
}

function goStage1() {
  hideAll();
  document.body.style.background = 'linear-gradient(135deg,#ffe4ec 0%,#ffd6e8 40%,#fce4ec 100%)';
  document.getElementById('stage-1').classList.add('show');
  startEffects();
}
function goStage2() {
  hideAll();
  document.body.style.background = 'linear-gradient(135deg,#fff0f5 0%,#ffe8f0 50%,#fdf0ff 100%)';
  document.getElementById('stage-2').classList.add('show');
}
function goStage3() {
  hideAll();
  document.body.style.background = 'linear-gradient(135deg,#fff9e6 0%,#fff0f5 50%,#e8f8ff 100%)';
  document.getElementById('stage-3').classList.add('show');
  startEffects();
}

function spawnConfetti() {
  for (let i = 0; i < 180; i++) {
    setTimeout(() => makeConfetti(), i * 18);
  }
  setInterval(() => { for (let i = 0; i < 12; i++) makeConfetti(); }, 800);
}
function makeConfetti() {
  const el = document.createElement('div');
  el.className = 'confetti-piece';
  el.style.left = Math.random() * 100 + 'vw';
  el.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
  el.style.width  = (6 + Math.random() * 10) + 'px';
  el.style.height = (6 + Math.random() * 10) + 'px';
  el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
  const dur = 2.2 + Math.random() * 2.5;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay   = (Math.random() * 1) + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 2) * 1000);
}
function addHeart() {
  const el = document.createElement('div');
  el.className = 'heart';
  el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (1.2 + Math.random() * 2.2) + 'rem';
  const dur = 4 + Math.random() * 4;
  el.style.animationDuration = dur + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000);
}
function addMsg() {
  const el = document.createElement('div');
  el.className = 'love-msg';
  el.textContent = loveMessages[msgIdx++ % loveMessages.length];
  el.style.left = (10 + Math.random() * 75) + 'vw';
  el.style.top  = (15 + Math.random() * 60) + 'vh';
  el.style.animationDuration = '4s';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4200);
}
</script>
</body>
</html>
